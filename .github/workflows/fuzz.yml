name: Fuzz

# Fuzzing links the whole crate (lancedb/ort native deps) and needs a nightly
# toolchain, so it runs on a schedule and on demand rather than on every PR.
on:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to run each fuzz target"
        required: false
        default: "300"

permissions:
  contents: read
  # Needed by the issue-on-failure step below.
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - memory_file
          - memory_file_roundtrip
          - scope_logical
          - scope_physical
          - scope_proximity
          - decay
          - composite_score
          - registry
          - slug
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install protobuf compiler and lld linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target\nfuzz -> target"

      - name: Restore fuzz corpus
        # The corpus grows as libfuzzer discovers new coverage; persist it
        # across weekly runs so each run resumes from accumulated coverage
        # instead of restarting from the curated seeds in git. Caches are
        # immutable, so key on run_id to save a fresh snapshot every run and
        # let restore-keys pick up the most recent previous one.
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run ${{ matrix.target }}
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ github.event.inputs.max_total_time || '300' }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore

      - name: File or update fuzz-failure issue
        # Scheduled runs have no human watching them; route failures to an
        # issue so a crash found on a Monday run isn't silently forgotten.
        # One open issue per target: repeat failures append a comment.
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ matrix.target }}';
            const label = 'fuzz-failure';
            const title = `Fuzz failure: ${target}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled fuzz run failed for target \`${target}\`.`,
              '',
              `Run: ${runUrl}`,
              '',
              'Crash inputs (if any) are in the run\'s `fuzz-artifacts-' + target + '` artifact.',
              'Reproduce locally with:',
              '```',
              `cargo +nightly fuzz run ${target} fuzz/artifacts/${target}/<crash-file>`,
              '```',
              'Per fuzz/ policy, commit the failing input as a corpus seed once fixed.',
            ].join('\n');
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'b60205',
                description: 'A scheduled fuzz run found a failure',
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = label already exists
            }
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: [label],
                body,
              });
            }
