name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ORT_VERSION: "1.23.2"

jobs:
  build-arm:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/protobuf
          key: brew-protobuf-macos-15

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # `--bin engramdb` resolves to the `engram-cli` crate via the workspace's
        # `default-members` (the binary is not in the root core-lib package).
        run: cargo build --release --bin engramdb

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../engramdb-aarch64-apple-darwin.tar.gz engramdb
          cd ../..
          shasum -a 256 engramdb-aarch64-apple-darwin.tar.gz > engramdb-aarch64-apple-darwin.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-aarch64-apple-darwin
          path: |
            engramdb-aarch64-apple-darwin.tar.gz
            engramdb-aarch64-apple-darwin.tar.gz.sha256

  build-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/protobuf
          key: brew-protobuf-macos-15-intel

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Download ONNX Runtime
        run: |
          curl -L -o /tmp/onnxruntime.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
          tar xzf /tmp/onnxruntime.tgz -C /tmp

      - name: Build release binary
        env:
          ORT_LIB_LOCATION: /tmp/onnxruntime-osx-x86_64-1.23.2/lib
          ORT_PREFER_DYNAMIC_LINK: "1"
          RUSTFLAGS: "-C link-arg=-Wl,-rpath,@executable_path"
        # `--bin engramdb` resolves via workspace `default-members` (see build-arm).
        run: cargo build --release --bin engramdb

      - name: Package binary with ONNX Runtime
        run: |
          mkdir -p staging
          cp target/release/engramdb staging/
          cp /tmp/onnxruntime-osx-x86_64-${ORT_VERSION}/lib/libonnxruntime.${ORT_VERSION}.dylib staging/
          cd staging
          tar czf ../engramdb-x86_64-apple-darwin.tar.gz engramdb libonnxruntime.${ORT_VERSION}.dylib
          cd ..
          shasum -a 256 engramdb-x86_64-apple-darwin.tar.gz > engramdb-x86_64-apple-darwin.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-x86_64-apple-darwin
          path: |
            engramdb-x86_64-apple-darwin.tar.gz
            engramdb-x86_64-apple-darwin.tar.gz.sha256

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler and lld linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # `--bin engramdb` resolves via workspace `default-members` (see build-arm).
        # ONNX Runtime is statically linked via fastembed's `download-binaries`,
        # so the binary is self-contained (no separate library to ship).
        run: cargo build --release --bin engramdb

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../engramdb-x86_64-unknown-linux-gnu.tar.gz engramdb
          cd ../..
          sha256sum engramdb-x86_64-unknown-linux-gnu.tar.gz > engramdb-x86_64-unknown-linux-gnu.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-x86_64-unknown-linux-gnu
          path: |
            engramdb-x86_64-unknown-linux-gnu.tar.gz
            engramdb-x86_64-unknown-linux-gnu.tar.gz.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: choco install protoc -y

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # The shared embedding daemon (Unix-domain-socket only) compiles out on
        # Windows via `#[cfg(unix)]`; model inference runs in-process. ONNX
        # Runtime is statically linked, so `engramdb.exe` is self-contained.
        # The release profile keeps the main thread under Windows' 1 MiB default
        # stack, so no `/STACK` linker flag is needed.
        run: cargo build --release --bin engramdb

      - name: Package binary
        shell: pwsh
        run: |
          Compress-Archive -Path target\release\engramdb.exe -DestinationPath engramdb-x86_64-pc-windows-msvc.zip
          $hash = (Get-FileHash engramdb-x86_64-pc-windows-msvc.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  engramdb-x86_64-pc-windows-msvc.zip" | Out-File -Encoding ascii engramdb-x86_64-pc-windows-msvc.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-x86_64-pc-windows-msvc
          path: |
            engramdb-x86_64-pc-windows-msvc.zip
            engramdb-x86_64-pc-windows-msvc.zip.sha256

  release:
    needs: [build-arm, build-intel, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            engramdb-*.tar.gz
            engramdb-*.tar.gz.sha256
            engramdb-*.zip
            engramdb-*.zip.sha256
