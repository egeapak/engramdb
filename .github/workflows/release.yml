name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Gate the whole release on version consistency: the pushed tag (v0.7.0), the
  # plugin manifest, the marketplace manifest, and the workspace version in
  # Cargo.toml (what `engramdb --version` actually reports) must all agree.
  # Catches a tag/manifest/binary drift before any binary is built or published.
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag matches manifest and workspace versions
        run: |
          tag_ver="${GITHUB_REF_NAME#v}"
          plugin_ver=$(jq -r '.version' .claude-plugin/plugin.json)
          market_ver=$(jq -r '.plugins[] | select(.name == "engram") | .version' .claude-plugin/marketplace.json)
          # [workspace.package] version is the single source of truth every
          # crate inherits (version.workspace = true); grep it out of the raw
          # TOML so this job stays toolchain-free.
          cargo_ver=$(sed -n '/^\[workspace\.package\]/,/^\[/s/^version = "\(.*\)"$/\1/p' Cargo.toml)
          echo "tag:              $tag_ver"
          echo "plugin.json:      $plugin_ver"
          echo "marketplace.json: $market_ver"
          echo "Cargo.toml:       $cargo_ver"
          fail=0
          [ "$plugin_ver" = "$tag_ver" ] || { echo "::error::plugin.json ($plugin_ver) != tag ($tag_ver)"; fail=1; }
          [ "$market_ver" = "$tag_ver" ] || { echo "::error::marketplace.json ($market_ver) != tag ($tag_ver)"; fail=1; }
          [ "$cargo_ver" = "$tag_ver" ] || { echo "::error::Cargo.toml [workspace.package] version ($cargo_ver) != tag ($tag_ver)"; fail=1; }
          exit $fail

  # Release binaries must come from a commit the test suite passed on: a tag
  # can point at any commit (including one that never went through a PR), so
  # run the same suite CI runs (see ci.yml `test`) before any build starts.
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Mirror ci.yml: drop debuginfo so the ~8 heavy test binaries stay
      # within the runner's disk, and skip dead-weight incremental state.
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install protobuf compiler and lld linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - uses: Swatinem/rust-cache@v2

      - name: Install nextest
        # Prebuilt binary, same rationale as ci.yml: `cargo install` compiles
        # nextest from source (~7 min on a cache miss).
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --all-features --locked

  build-arm:
    needs: [version-check, test]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/protobuf
          key: brew-protobuf-macos-15

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # `--bin engramdb` resolves to the `engram-cli` crate via the workspace's
        # `default-members` (the binary is not in the root core-lib package).
        # `--locked` ensures the shipped binary uses exactly the committed
        # Cargo.lock instead of silently re-resolving newer dependency versions.
        run: cargo build --release --bin engramdb --locked

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../engramdb-aarch64-apple-darwin.tar.gz engramdb
          cd ../..
          shasum -a 256 engramdb-aarch64-apple-darwin.tar.gz > engramdb-aarch64-apple-darwin.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-aarch64-apple-darwin
          path: |
            engramdb-aarch64-apple-darwin.tar.gz
            engramdb-aarch64-apple-darwin.tar.gz.sha256

  # Intel Mac (`x86_64-apple-darwin`) ships the **pure-Rust `tract` backend**
  # instead of ONNX Runtime. `fastembed` pins `ort = "=2.0.0-rc.12"` (needs ONNX
  # Runtime 1.24 / API-24), and no prebuilt ORT 1.24 exists for Intel Mac
  # anywhere — the old ORT-based Intel binary crashed on first model load. `tract`
  # has no native library, so this cross-build from the arm64 runner needs no ORT
  # download and produces a self-contained binary that works out of the box. It
  # uses the fp32 MiniLM (int8 does not load under tract) at ~3× the embedding
  # latency; NLI / reranker / T5 are compiled out (embeddings-only). See
  # docs/users/installation.md.
  build-intel:
    needs: [version-check, test]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/protobuf
          key: brew-protobuf-macos-15

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Add Intel macOS target
        run: rustup target add x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary (pure-Rust tract, no ONNX Runtime)
        # `--no-default-features --features tract` drops the entire `ort` /
        # `fastembed` stack (no prebuilt runtime for this target) and selects the
        # pure-Rust tract embedding backend, which cross-compiles cleanly.
        run: cargo build --release --bin engramdb --locked --target x86_64-apple-darwin --no-default-features --features tract

      - name: Package binary
        run: |
          cd target/x86_64-apple-darwin/release
          tar czf ../../../engramdb-x86_64-apple-darwin.tar.gz engramdb
          cd ../../..
          shasum -a 256 engramdb-x86_64-apple-darwin.tar.gz > engramdb-x86_64-apple-darwin.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-x86_64-apple-darwin
          path: |
            engramdb-x86_64-apple-darwin.tar.gz
            engramdb-x86_64-apple-darwin.tar.gz.sha256

  build-linux:
    needs: [version-check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler and lld linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # `--bin engramdb` resolves via workspace `default-members` (see build-arm).
        # ONNX Runtime is statically linked via fastembed's `download-binaries`,
        # so the binary is self-contained (no separate library to ship).
        run: cargo build --release --bin engramdb --locked

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../engramdb-x86_64-unknown-linux-gnu.tar.gz engramdb
          cd ../..
          sha256sum engramdb-x86_64-unknown-linux-gnu.tar.gz > engramdb-x86_64-unknown-linux-gnu.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-x86_64-unknown-linux-gnu
          path: |
            engramdb-x86_64-unknown-linux-gnu.tar.gz
            engramdb-x86_64-unknown-linux-gnu.tar.gz.sha256

  build-windows:
    needs: [version-check, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: choco install protoc -y

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        # The shared embedding daemon (Unix-domain-socket only) compiles out on
        # Windows via `#[cfg(unix)]`; model inference runs in-process. ONNX
        # Runtime is statically linked, so `engramdb.exe` is self-contained.
        # The release profile keeps the main thread under Windows' 1 MiB default
        # stack, so no `/STACK` linker flag is needed.
        run: cargo build --release --bin engramdb --locked

      - name: Package binary
        shell: pwsh
        run: |
          Compress-Archive -Path target\release\engramdb.exe -DestinationPath engramdb-x86_64-pc-windows-msvc.zip
          $hash = (Get-FileHash engramdb-x86_64-pc-windows-msvc.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  engramdb-x86_64-pc-windows-msvc.zip" | Out-File -Encoding ascii engramdb-x86_64-pc-windows-msvc.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-x86_64-pc-windows-msvc
          path: |
            engramdb-x86_64-pc-windows-msvc.zip
            engramdb-x86_64-pc-windows-msvc.zip.sha256

  release:
    needs: [build-arm, build-intel, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            engramdb-*.tar.gz
            engramdb-*.tar.gz.sha256
            engramdb-*.zip
            engramdb-*.zip.sha256
