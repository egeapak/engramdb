name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/protobuf
          key: brew-protobuf-macos-15

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../engramdb-aarch64-apple-darwin.tar.gz engramdb
          cd ../..
          shasum -a 256 engramdb-aarch64-apple-darwin.tar.gz > engramdb-aarch64-apple-darwin.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: engramdb-aarch64-apple-darwin
          path: |
            engramdb-aarch64-apple-darwin.tar.gz
            engramdb-aarch64-apple-darwin.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            engramdb-*.tar.gz
            engramdb-*.tar.gz.sha256
