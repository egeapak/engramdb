name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Keep the build under the runner's ~30 GB disk and speed it up. The layered
  # workspace produces ~8 heavy test binaries that each statically link the
  # lancedb/arrow/datafusion/onnx stack; full debuginfo on every one is the bulk
  # of `target/` and a chunk of compile time. CI never attaches a debugger, and
  # nextest still reports the failing test name + assertion message without it,
  # so we drop debuginfo entirely (`debug=0`). Incremental compilation is dead
  # weight on a clean checkout. (~38 GB -> well under 10 GB.)
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  # Cheap, toolchain-free guard: the plugin version lives in TWO manifests
  # (.claude-plugin/plugin.json and .claude-plugin/marketplace.json). If they
  # drift, `/plugin update` compares the marketplace entry and silently keeps
  # the stale install pinned — the plugin's MCP server then loads an old cached
  # version. Fail fast when they disagree so releases can't ship the mismatch.
  manifest-version:
    name: Manifest version parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check plugin.json == marketplace.json version
        run: |
          plugin_ver=$(jq -r '.version' .claude-plugin/plugin.json)
          market_ver=$(jq -r '.plugins[] | select(.name == "engram") | .version' .claude-plugin/marketplace.json)
          echo "plugin.json:      $plugin_ver"
          echo "marketplace.json: $market_ver"
          if [ -z "$plugin_ver" ] || [ "$plugin_ver" = "null" ]; then
            echo "::error file=.claude-plugin/plugin.json::missing .version"; exit 1
          fi
          if [ -z "$market_ver" ] || [ "$market_ver" = "null" ]; then
            echo "::error file=.claude-plugin/marketplace.json::engram plugin entry is missing .version (add it, matching plugin.json)"; exit 1
          fi
          if [ "$plugin_ver" != "$market_ver" ]; then
            echo "::error::plugin.json ($plugin_ver) and marketplace.json ($market_ver) disagree — bump both together"; exit 1
          fi
          echo "OK: versions match ($plugin_ver)"

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Install protobuf compiler and lld linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # The `ollama` feature is on by default and gates `#[cfg(feature = "ollama")]`
      # branches (e.g. in src/ops/mod.rs). The all-features build above never
      # exercises the pure-ONNX path, so a `--no-default-features` compile break
      # would otherwise ship unnoticed. Cheap `check` only.
      - name: Check (no default features)
        run: cargo check --workspace --no-default-features

  # Linux full tests run in the `test` job below; this matrix only `cargo check`s
  # the non-Linux targets that `release.yml` actually ships (macOS + Windows) so
  # that platform-gated code — most importantly the Windows named-pipe daemon
  # transport (`#[cfg(windows)]` in src/daemon/transport.rs) and the `#[cfg(unix)]`
  # Unix-socket path — compiles on every PR instead of first failing at release
  # time. Check only (no link/test): fast, and the ORT binary download +
  # per-OS protoc install are the only setup differences from the Linux job.
  check-cross:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: Swatinem/rust-cache@v2

      - name: Check
        # ONNX Runtime is downloaded + statically linked by fastembed's
        # `download-binaries` (same as release.yml), so no manual ORT setup.
        run: cargo check --workspace --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install protobuf compiler and lld linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - uses: Swatinem/rust-cache@v2

      - name: Install nextest
        # Use the prebuilt binary instead of `cargo install cargo-nextest`,
        # which compiles nextest from source (~7 min on a cache miss). This
        # downloads a prebuilt release in seconds, every run, regardless of
        # cache state.
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # `llvm-tools-preview` ships `llvm-profdata`/`llvm-cov`, which
        # cargo-llvm-cov shells out to for instrumentation-based coverage.
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview

      - name: Install protobuf compiler and lld linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler lld

      - uses: Swatinem/rust-cache@v2

      - name: Install nextest and cargo-llvm-cov
        # Prebuilt binaries (same rationale as the test job): avoids a
        # ~7 min from-source compile of each tool on a cache miss.
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov

      - name: Run tests under coverage instrumentation
        # Mirror the `test` job's invocation so coverage reflects the real
        # suite. `--no-report` defers report generation so we can emit
        # multiple formats from the one profdata set below.
        run: cargo llvm-cov nextest --workspace --all-features --no-report

      - name: Generate coverage reports
        # Exclude integration-test harness files and the test-isolation crate
        # from the denominator so the percentage tracks production code.
        env:
          IGNORE: '(/tests?/|test_support|engram-test-support|/benches/|/examples/|/fuzz/)'
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info --ignore-filename-regex "$IGNORE"
          {
            echo '## Coverage summary'
            echo ''
            echo '```'
            cargo llvm-cov report --summary-only --ignore-filename-regex "$IGNORE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lcov report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
