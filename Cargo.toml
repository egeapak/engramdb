[package]
name = "engramdb"
version = "0.2.1"
edition = "2021"

[[bin]]
name = "engramdb"
path = "src/main.rs"

[lib]
name = "engramdb"
path = "src/lib.rs"

[features]
default = ["ollama"]
ollama = ["reqwest"]

[dependencies]
# MCP Server
rmcp = { version = "0.15", features = ["macros", "server", "transport-io", "transport-streamable-http-server"] }
axum = "0.8"

# Vector DB & Embeddings
lancedb = "0.26"
fastembed = "5"
reqwest = { version = "0.12", features = ["json"], optional = true }
arrow-array = "57"
arrow-schema = "57"

# NLI (contradiction detection)
ort = { version = "2.0.0-rc.11", default-features = false, features = ["download-binaries", "ndarray", "std"] }
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
hf-hub = "0.4"
ndarray = { version = "0.17", default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"

# CLI
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
inquire = "0.7"
owo-colors = { version = "4", features = ["supports-colors"] }

# Utilities
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
globset = "0.4"
sha2 = "0.10"
dirs = "6"

# Async
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util", "sync", "net"] }
futures = "0.3"
async-trait = "0.1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "2"
anyhow = "1"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
regex = "1"
