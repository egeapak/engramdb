[package]
name = "engramdb"
version = "0.6.0"
edition = "2021"
license = "MIT"
description = "Project-scoped persistent memory for coding agents"
repository = "https://github.com/egeapak/engramdb"

[[bin]]
name = "engramdb"
path = "src/main.rs"

[lib]
name = "engramdb"
path = "src/lib.rs"

[features]
default = ["ollama"]
ollama = ["reqwest"]
# Apple Core ML (GPU / Neural Engine) acceleration for all ONNX models.
# Enable on macOS only: `cargo build --features coreml`. Off by default so
# the Linux/CI build and prebuilt-binary download are unchanged.
coreml = ["ort/coreml"]

[dependencies]
# MCP Server
rmcp = { version = "0.15", features = ["macros", "server", "transport-io", "transport-streamable-http-server"] }
axum = { version = "0.8", default-features = false, features = ["tokio"] }

# Vector DB & Embeddings
lancedb = { version = "0.26", default-features = false }
fastembed = { version = "5", default-features = false, features = ["ort-download-binaries-rustls-tls", "hf-hub-rustls-tls"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
arrow-array = "57"
arrow-schema = "57"

# NLI (contradiction detection)
ort = { version = "2.0.0-rc.11", default-features = false, features = ["download-binaries", "ndarray", "std"] }
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
hf-hub = { version = "0.4", default-features = false, features = ["rustls-tls", "tokio", "ureq"] }
ndarray = { version = "0.17", default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yml = "0.0"
toml = "0.8"

# CLI
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
inquire = "0.7"
owo-colors = { version = "4", features = ["supports-colors"] }
indicatif = "0.18"
rayon = "1"

# Utilities
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
globset = "0.4"
sha2 = "0.10"
shell-words = "1"
dirs = "6"
jwalk = "0.8"
fs4 = { version = "0.12", features = ["sync"] }

# Async
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util", "sync", "net", "process"] }
futures-util = { version = "0.3", default-features = false }
async-trait = "0.1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Atomic file writes
tempfile = "3"

[dev-dependencies]
assert_cmd = "2"
ctor = "0.4"
predicates = "3"
rand = "0.9"
regex = "1"
criterion = { version = "0.8", features = ["html_reports", "async_tokio"] }

[[bench]]
name = "benchmarks"
harness = false

[profile.release]
lto = true
opt-level = "z"
strip = true
panic = "abort"
codegen-units = 1

[profile.bench]
lto = false
opt-level = 2
codegen-units = 16
